<!DOCTYPE html>

<html class="light" lang="id"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "primary-fixed-dim": "#afc8f0",
                    "secondary": "#735c00",

                    "surface": "#faf9f5",
                    "inverse-primary": "#afc8f0",
                    "surface-dim": "#dbdad6",
                    "surface-bright": "#faf9f5",

                    "on-secondary-fixed-variant": "#574500",
                    "on-primary-container": "#6f88ad",
                    "surface-container": "#efeeea",

                    "secondary-fixed": "#ffe088",

            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        .glass-header {
            background: rgba(250, 249, 245, 0.85);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f5]/85 dark:bg-[#000613]/85 backdrop-blur-xl shadow-sm">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-[#000613] dark:text-[#faf9f5] active:scale-95 transition-transform hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Noto_Serif'] text-xl tracking-tight text-[#000613] dark:text-[#faf9f5] font-bold">Edit Ulasan</h1>
</div>
<button class="text-[#000613] dark:text-[#faf9f5] active:scale-95 transition-transform hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-lg mx-auto">
<!-- Product Context Card -->
<section class="mb-10">
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_20px_40px_rgba(27,28,26,0.06)] flex items-center gap-4">
<div class="w-20 h-20 rounded-lg overflow-hidden bg-surface-container-low flex-shrink-0">
<img alt="Product Image" class="w-full h-full object-cover" data-alt="Close-up of a luxurious silk scarf with intricate golden patterns draped elegantly over a warm neutral surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGiQVkhpsbTDsaTdqEuCF8q-8iJY5kTjgCbIhh1iPIXAPRhrwYINRYun-hfwwPzeOrG4saJd9gvw4N8s5qcWQ7u9iE_kFnkC_qNQQOMnFf0XGjbRi62FfJCHz7c78ikOHvT9se-QpQSbEvUHBhbeY-0CuqqO0Zsm9jpw57YCIdtQh61b7zABl5-ZTb-eOvohw5QnkuFBPI0VUkIZ-rS-tMFSReZ3kGGz8leJqGM4t8qcNSf_7u5PqK3TD58ewzMJgpZuM5idzRZUg"/>
</div>
<div>
<h2 class="font-headline text-lg font-bold text-primary leading-tight">Aurelian Silk Scarf</h2>
<p class="font-body text-sm text-on-surface-variant mt-1">Varian: Royal Gold / 120cm</p>
</div>
</div>
</section>
<!-- Rating Section -->
<section class="mb-10 text-center">
<h3 class="font-headline text-xl mb-4 text-primary">Kualitas Produk</h3>
<div class="flex justify-center gap-2">
<span class="material-symbols-outlined filled-icon text-secondary text-4xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined filled-icon text-secondary text-4xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined filled-icon text-secondary text-4xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined filled-icon text-secondary text-4xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-outline-variant text-4xl cursor-pointer">star</span>
</div>
<p class="text-secondary font-semibold text-sm mt-3 uppercase tracking-widest">Sangat Baik</p>
</section>
<!-- Form Section -->
<section class="space-y-8">
<!-- Review Text -->
<div class="relative">
<label class="block font-label text-xs font-bold text-secondary uppercase tracking-widest mb-2 ml-1">Ulasan Anda</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-5 text-on-surface font-body text-base focus:ring-1 focus:ring-secondary/40 min-h-[160px] resize-none" placeholder="Ceritakan pengalaman Anda...">Produk sangat berkualitas, pengiriman cepat.</textarea>
</div>
<!-- Photo Upload Area -->
<div>
<label class="block font-label text-xs font-bold text-secondary uppercase tracking-widest mb-3 ml-1">Lampiran Foto</label>
<div class="flex gap-3">
<div class="relative w-24 h-24 rounded-xl overflow-hidden shadow-sm group">
<img alt="User Upload" class="w-full h-full object-cover" data-alt="Lifestyle photo of a premium designer product held by a person in a minimalist high-end boutique setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqbo2W4ojYx8qEiZSP_oy8vjz9-f0tVb9xi1ZOXDcfXWJvMWSvHmr-ycyfcmVLIQkVANN4_avwCnOvrEfmwRk-y70e7U52co1-9VFC3LOKTUK311Kmw4H_e7QJGpbgKqt7oRRAQMQOdp430sUNIs5smdxwIEK2OcJzAz1sgojMMDsnk-3KJEj9NxA16WncQM15Ti3-vcF1zs8HwXREWRu64kNxoRQWtZaUqn3bKvlKQmwQCuR8mtv_IcHqUYZooocuBdWqiABV-ng"/>
<button class="absolute top-1 right-1 bg-primary/80 text-white rounded-full p-1 scale-75">
<span class="material-symbols-outlined text-xs">close</span>
</button>
</div>
<button class="w-24 h-24 rounded-xl border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined mb-1">add_a_photo</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Tambah</span>
</button>
</div>
</div>
<!-- Checkbox Option -->
<div class="flex items-center gap-3 py-2">
<div class="w-6 h-6 rounded-md bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="font-body text-sm text-on-surface">Tampilkan ulasan secara anonim</span>
</div>
</section>
<!-- Action Button -->
<div class="mt-12">
<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-body font-bold text-base tracking-wide shadow-[0_10px_20px_rgba(0,6,19,0.15)] active:scale-[0.98] transition-all relative overflow-hidden group">
<span class="relative z-10">Simpan Perubahan</span>
<div class="absolute inset-0 bg-gradient-to-r from-primary to-primary-container opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<button class="w-full mt-4 py-4 text-on-surface-variant font-body font-semibold text-sm hover:text-primary transition-colors">
                Batalkan
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[32px] bg-[#ffffff]/85 dark:bg-[#000613]/85 backdrop-blur-2xl shadow-[0_-20px_40px_rgba(27,28,26,0.06)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-8 pt-4">
<a class="flex flex-col items-center justify-center text-[#43474e] opacity-50 transition-colors hover:text-[#000613]" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Beranda</span>
</a>
<a class="flex flex-col items-center justify-center text-[#43474e] opacity-50 transition-colors hover:text-[#000613]" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Koleksi</span>
</a>
<a class="flex flex-col items-center justify-center text-[#735c00] dark:text-[#735c00] scale-110 transition-all" href="#">
<span class="material-symbols-outlined filled-icon" data-icon="rate_review" style="font-variation-settings: 'FILL' 1;">rate_review</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Ulasan</span>
</a>
<a class="flex flex-col items-center justify-center text-[#43474e] opacity-50 transition-colors hover:text-[#000613]" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Profil</span>
</a>
</div>
</nav>
</body></html>
