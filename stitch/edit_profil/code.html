<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {

                    "on-tertiary": "#ffffff",
                    "surface-dim": "#dbdad6",
                    "on-secondary": "#ffffff",
                    "secondary": "#735c00",
                    "secondary-container": "#fed65b",
                    "inverse-primary": "#afc8f0",
                    "on-primary-fixed": "#001c3a",
                    "tertiary-container": "#1d1f1c",
                    "outline": "#74777f",
                    "on-secondary-fixed-variant": "#574500",
                    "primary-fixed-dim": "#afc8f0",
                    "primary": "#000613",
                    "secondary-fixed": "#ffe088",
                    "tertiary-fixed-dim": "#c6c7c2",
                    "secondary-fixed-dim": "#e9c349",
                    "on-secondary-fixed": "#241a00",
                    "on-primary-fixed-variant": "#2f486a",
                    "primary-fixed": "#d4e3ff",
                    "surface": "#faf9f5",

                    "headline": ["Noto Serif"],

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
      }
      .perspective-card {
        box-shadow: 0px 20px 40px rgba(27, 28, 26, 0.06);
      }
      .ghost-border {
        border: 1px solid rgba(196, 198, 207, 0.2);
      }
      .inner-glow-primary {
        background: linear-gradient(145deg, #001f3f, #000613);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f5]/85 backdrop-blur-xl flex items-center justify-between px-6 py-4 shadow-sm shadow-[#1b1c1a]/5">
<button class="flex items-center justify-center w-10 h-10 active:scale-95 duration-200 text-[#000613]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-lg tracking-tight font-bold text-[#000613]">Edit Profil</h1>
<button class="flex items-center justify-center w-10 h-10 active:scale-95 duration-200 text-[#000613]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="pt-24 px-6 max-w-md mx-auto">
<!-- Avatar Section -->
<section class="flex flex-col items-center mb-12">
<div class="relative">
<div class="w-32 h-32 rounded-full overflow-hidden perspective-card bg-surface-container-low p-1">
<img alt="Aditya Wijaya Avatar" class="w-full h-full object-cover rounded-full" data-alt="close-up portrait of a professional young man with short dark hair in a soft sunlit studio setting with warm beige background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAX-9bm8So497UvfiC169BXG5f7r_48IV7h1lD68zSx710C5otGd906WrCUnRi1dGPz9w6AOXOEYWzJaVH-kWEyRerJ8kTWgQLL4FVJYpgSeqyBbUvvx-NwLIrVu9JBmbVhzEgTa06r6J56k-Fm0HezkkeBzk1XRSdW5uFd5UKgJM7QCN2ET7SSO5kEow-smkD7IlbEKFTtlWOApHj4Bt2iZBwIOLd7mDVluKpvbYLJigKEo4cnxNFYTUbKie9kSiYKnJXEQuNzHLQ"/>
</div>
<button class="absolute bottom-0 right-0 bg-secondary text-on-secondary w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</button>
</div>
<p class="mt-4 text-secondary font-semibold font-label text-sm uppercase tracking-widest">Ubah Foto Profil</p>
</section>
<!-- Form Section -->
<section class="space-y-8">
<!-- Nama Input -->
<div class="relative group">
<label class="block mb-2 ml-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant font-label">Nama Lengkap</label>
<div class="bg-surface-container-low rounded-xl px-6 py-4 focus-within:ring-1 focus-within:ring-secondary/40 transition-all duration-300">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-semibold text-lg focus:ring-0 placeholder:text-outline-variant" placeholder="Masukkan nama Anda" type="text" value="Aditya Wijaya"/>
</div>
</div>
<!-- Email Input -->
<div class="relative group">
<label class="block mb-2 ml-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant font-label">Alamat Email</label>
<div class="bg-surface-container-low rounded-xl px-6 py-4 focus-within:ring-1 focus-within:ring-secondary/40 transition-all duration-300">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-semibold text-lg focus:ring-0 placeholder:text-outline-variant" placeholder="nama@domain.com" type="email" value="aditya.w@email.com"/>
</div>
</div>
<!-- Nomor HP Input -->
<div class="relative group">
<label class="block mb-2 ml-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant font-label">Nomor Telepon</label>
<div class="bg-surface-container-low rounded-xl px-6 py-4 focus-within:ring-1 focus-within:ring-secondary/40 transition-all duration-300 flex items-center">
<span class="text-on-surface-variant font-semibold mr-3">+62</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-semibold text-lg focus:ring-0 placeholder:text-outline-variant" placeholder="812 3456 7890" type="tel" value="0812 3456 7890"/>
</div>
</div>
<!-- Additional Curated Options -->
<div class="pt-4">
<div class="bg-surface-container rounded-xl p-6 flex items-center justify-between group active:scale-[0.98] transition-all cursor-pointer">
<div class="flex items-center space-x-4">
<div class="bg-surface-container-lowest p-2 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-secondary" data-icon="lock_reset">lock_reset</span>
</div>
<div>
<h4 class="font-bold text-sm text-on-surface">Ubah Kata Sandi</h4>
<p class="text-xs text-on-surface-variant">Terakhir diubah 3 bulan lalu</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</section>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-surface via-surface/95 to-transparent z-40">
<div class="max-w-md mx-auto">
<button class="w-full py-5 inner-glow-primary text-on-primary rounded-xl font-bold tracking-wide shadow-2xl active:scale-95 transition-all duration-200">
                Simpan Perubahan
            </button>
</div>
</div>
<!-- Bottom Navigation Bar - Suppressed for Transactional screen (Profile Edit) as per Shell Visibility Rule -->
<!-- However, providing a subtle 'cancel' or 'back' affordance if the user wants to discard changes -->
</body></html>
