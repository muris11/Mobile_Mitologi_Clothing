<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/85 dark:bg-slate-950/85 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0_4px_30px_rgba(0,0,0,0.03)]">

</div>

<div class="absolute inset-0 bg-surface-container-low rounded-[40px] -rotate-3 scale-105 opacity-50"></div>
<!-- Main Content Card -->
<div class="relative bg-surface-container-lowest rounded-[32px] p-10 shadow-[0px_20px_40px_rgba(27,28,26,0.06)] text-center w-full">

<div class="mb-8 flex justify-center">

<span class="material-symbols-outlined text-secondary text-4xl" data-icon="wifi_off">wifi_off</span>
</div>
</div>
<!-- Textual Content -->
<h1 class="text-3xl font-headline text-primary mb-4 leading-tight">Gagal Memuat Data</h1>
<p class="text-on-surface-variant font-body font-light leading-relaxed mb-10">
                    Kami tidak dapat mengambil informasi saat ini. Silakan coba beberapa saat lagi.
                </p>
<!-- Primary Action with Satin Sheen -->
<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-body font-semibold tracking-wide shadow-xl active:scale-95 transition-all duration-300 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-primary-container opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="relative z-10 flex items-center justify-center gap-2">
                        Ulangi Sekarang
                        <span class="material-symbols-outlined text-[20px]" data-icon="refresh">refresh</span>
</span>
</button>
<!-- Secondary Link -->
<button class="mt-8 text-secondary font-body font-medium text-sm tracking-widest uppercase hover:opacity-70 transition-opacity">
                    Hubungi Bantuan
                </button>
</div>
<!-- Overlapping Visual (Product Texture Suggestion) -->
<div class="absolute -bottom-6 -right-4 w-24 h-32 rounded-2xl overflow-hidden shadow-2xl rotate-6 border-[6px] border-white">

</div>
</div>

<div class="text-center">
<span class="text-outline-variant font-label text-[10px] uppercase tracking-[0.2em]">Kode Galat: ERR_CONN_075</span>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused retry state as per Relevance Check, but provided here as the shell requires it for top-level context) -->

<button class="flex items-center gap-3 text-on-surface-variant font-body font-light hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>

        </button>
</div>
