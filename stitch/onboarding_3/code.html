</div>
</div>
</div>
</div>

<div class="flex gap-2 mb-8">
<div class="h-1.5 w-6 rounded-full bg-outline-variant/30"></div>
<div class="h-1.5 w-6 rounded-full bg-outline-variant/30"></div>

<h1 class="font-headline text-3xl font-light text-primary leading-tight mb-4 tracking-tight">
                Pengalaman Belanja Modern

            </p>

<div class="w-full max-w-md space-y-6">
