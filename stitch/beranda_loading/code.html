<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #efeeea 25%, #e3e2df 50%, #efeeea 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-dark {
            background: linear-gradient(90deg, #e3e2df 25%, #dbdad6 50%, #e3e2df 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f5]/85 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<button class="text-[#000613] hover:opacity-70 transition-opacity active:scale-95 transition-transform duration-200">

</button>
<h1 class="text-2xl font-['Noto_Serif'] text-[#000613] tracking-[0.2em] font-bold">ATELIER</h1>

<div class="skeleton-dark h-4 w-1/2 rounded-md"></div>
<div class="skeleton-dark h-12 w-32 rounded-xl"></div>
</div>
</div>
</section>
<!-- Categories Section -->
<section class="mt-12 px-6">
<h2 class="font-headline text-xl font-bold mb-6 text-primary">Kategori</h2>
<div class="flex gap-4 overflow-x-hidden">
<!-- Category Placeholders -->
<div class="flex-shrink-0 flex flex-col items-center gap-3">
<div class="skeleton w-20 h-20 rounded-full"></div>
<div class="skeleton w-14 h-3 rounded-full"></div>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-3">
<div class="skeleton w-20 h-20 rounded-full"></div>
<div class="skeleton w-14 h-3 rounded-full"></div>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-3">
<div class="skeleton w-20 h-20 rounded-full"></div>
<div class="skeleton w-14 h-3 rounded-full"></div>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-3">
<div class="skeleton w-20 h-20 rounded-full"></div>
<div class="skeleton w-14 h-3 rounded-full"></div>
</div>
</div>
</section>

<div class="flex justify-between items-end mb-6">

<span class="text-secondary font-label text-sm font-semibold tracking-wider">LIHAT SEMUA</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Bento Item 1: Large -->
<div class="col-span-2">
<div class="bg-surface-container-lowest p-4 rounded-[24px] space-y-4 shadow-sm">

<div class="skeleton h-4 w-full rounded-md"></div>
<div class="skeleton h-3 w-1/2 rounded-md"></div>
</div>

<div class="skeleton-dark h-4 w-5/6 mx-auto rounded-md"></div>
<div class="pt-4">
<div class="skeleton-dark h-12 w-full rounded-xl"></div>
</div>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-4 pb-safe bg-[#ffffff]/85 glass-nav z-50 rounded-t-[20px] shadow-2xl">
<!-- Atelier (Active) -->
<a class="flex flex-col items-center justify-center text-[#735c00] font-bold active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="home_app_logo" style="font-variation-settings: 'FILL' 1;">home_app_logo</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-wider mt-1">Atelier</span>
</a>
