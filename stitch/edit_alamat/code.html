<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#faf9f5]/85 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full no-border shadow-sm shadow-[#1b1c1a]/5">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[#000613]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Noto_Serif'] text-lg tracking-tight font-bold text-[#000613]">Edit Alamat</h1>
</div>
<div class="flex items-center">
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[#000613]" data-icon="settings">settings</span>
</button>
</div>
</nav>
<!-- Content Canvas -->
<main class="flex-1 pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<form class="space-y-8">
<!-- Label Alamat Chips -->
<section>
<label class="block text-sm font-medium mb-4 text-on-surface-variant tracking-wide uppercase">Label Alamat</label>
<div class="flex gap-3">
<button class="px-6 py-2.5 rounded-full bg-primary text-on-primary font-semibold text-sm shadow-lg shadow-primary/10 transition-all" type="button">
                        Rumah
                    </button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-highest transition-all font-medium text-sm" type="button">
                        Kantor
                    </button>
</div>
</section>
<!-- Inputs -->
<div class="space-y-6">
<!-- Nama Penerima -->
<div class="relative">
<label class="absolute -top-2.5 left-4 px-1 bg-surface text-xs font-semibold text-secondary tracking-wider uppercase">Nama Penerima</label>
<input class="w-full bg-transparent border-outline-variant/30 focus:border-secondary/40 focus:ring-0 rounded-xl py-4 px-4 text-on-surface font-medium transition-all outline-none" type="text" value="Arisatya Permana"/>
</div>
<!-- Nomor HP -->
<div class="relative">
<label class="absolute -top-2.5 left-4 px-1 bg-surface text-xs font-semibold text-on-surface-variant tracking-wider uppercase">Nomor HP</label>
<input class="w-full bg-transparent border-outline-variant/30 focus:border-secondary/40 focus:ring-0 rounded-xl py-4 px-4 text-on-surface font-medium transition-all outline-none" type="tel" value="+62 812 3456 7890"/>
</div>
<!-- Alamat Lengkap -->
<div class="relative">
<label class="absolute -top-2.5 left-4 px-1 bg-surface text-xs font-semibold text-on-surface-variant tracking-wider uppercase">Alamat Lengkap</label>
<textarea class="w-full bg-transparent border-outline-variant/30 focus:border-secondary/40 focus:ring-0 rounded-xl py-4 px-4 text-on-surface font-medium transition-all outline-none resize-none" rows="3">Jl. Senopati No. 42, Kebayoran Baru, Jakarta Selatan. Dekat gedung perkantoran utama.</textarea>
</div>
<!-- Kota & Kode Pos (Bento Style Row) -->
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="absolute -top-2.5 left-4 px-1 bg-surface text-xs font-semibold text-on-surface-variant tracking-wider uppercase">Kota</label>
<input class="w-full bg-transparent border-outline-variant/30 focus:border-secondary/40 focus:ring-0 rounded-xl py-4 px-4 text-on-surface font-medium transition-all outline-none" type="text" value="Jakarta Selatan"/>
</div>
<div class="relative">
<label class="absolute -top-2.5 left-4 px-1 bg-surface text-xs font-semibold text-on-surface-variant tracking-wider uppercase">Kode Pos</label>
<input class="w-full bg-transparent border-outline-variant/30 focus:border-secondary/40 focus:ring-0 rounded-xl py-4 px-4 text-on-surface font-medium transition-all outline-none" type="text" value="12110"/>
</div>
</div>
</div>
<!-- Switch Alamat Utama -->
<div class="p-6 rounded-2xl bg-surface-container-low flex items-center justify-between group hover:bg-surface-container transition-colors">
<div class="space-y-1">
<h3 class="font-bold text-on-surface">Jadikan Alamat Utama</h3>
<p class="text-xs text-on-surface-variant">Alamat ini akan digunakan secara otomatis saat checkout.</p>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
</div>
</div>
<!-- Map Preview (Visual Depth) -->
<div class="rounded-3xl overflow-hidden shadow-xl shadow-on-surface/5 relative aspect-video bg-surface-container-highest">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="minimalist map view of Jakarta city streets with soft beige and gray tones matching the aesthetic" data-location="Jakarta" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnwxHBtGxVivBH8jM5w_tXNkDpkxzBnFq_DQ_8aomPgiAr02HeJkdCtOy4YXmsmatZizR_g6VEA8Yuq7Vk_cfxqauPQu4h8dolQiDC7PqOmDvxNpDFpgevlay2D5r5KiM0L8EWPOBYfT4O5uQkyBC6rjg6COiX2AAVJvD0gTzjW_DDWMT-wYr73jPszpaeCUWOkSuCjyZDAaCkqZ-z6IM5p4zz7qRR4LsA7T9bBHUNaGPd5_-5AIPKA5sg3U62Vf057Xu_LpQSbXE"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center shadow-2xl animate-pulse">
<span class="material-symbols-outlined text-white" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<div class="absolute bottom-4 left-4 bg-white/80 backdrop-blur-md px-4 py-2 rounded-xl">
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Pin Lokasi Akurat</span>
</div>
</div>
</form>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-surface-bright/90 backdrop-blur-xl z-40 border-none">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary text-on-primary py-5 rounded-[20px] font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-3 shadow-2xl shadow-primary/20 active:scale-[0.98] transition-transform">
                Simpan Perubahan
                <span class="material-symbols-outlined text-lg" data-icon="done_all">done_all</span>
</button>
</div>
</div>
<!-- BottomNavBar (Optional Suppression: Suppressing because this is a focused task-focused page, but following structure if needed) -->
<!-- Suppressed for transactional focus as per Shell Visibility Rule -->
</body></html>
